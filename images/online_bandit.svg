<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 736 625" role="img" aria-labelledby="title desc">
  <title id="title">Online bandit PGM</title>
  <desc id="desc">Two-step graph with a_t to r_t, a_t+1 to r_t+1, and a cross-time arrow from r_t to a_t+1.</desc>
  <rect width="736" height="625" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#000"/>
    </marker>
    <style>
      .node { fill: none; stroke: #000; stroke-width: 6; }
      .edge { stroke: #000; stroke-width: 8; marker-end: url(#arrow); fill: none; }
      .label { font-family: 'Times New Roman', serif; font-style: italic; font-size: 90px; }
      .sub { font-size: 58px; }
    </style>
  </defs>

  <ellipse class="node" cx="141" cy="112" rx="112" ry="84"/>
  <ellipse class="node" cx="589" cy="112" rx="112" ry="84"/>
  <ellipse class="node" cx="141" cy="492" rx="112" ry="84"/>
  <ellipse class="node" cx="589" cy="492" rx="112" ry="84"/>

  <line class="edge" x1="141" y1="380" x2="141" y2="245"/>
  <line class="edge" x1="589" y1="380" x2="589" y2="245"/>
  <line class="edge" x1="232" y1="228" x2="497" y2="457"/>

  <text class="label" x="106" y="132">r<tspan class="sub" dy="20">t</tspan></text>
  <text class="label" x="539" y="132">r<tspan class="sub" dy="20">t+1</tspan></text>
  <text class="label" x="106" y="512">a<tspan class="sub" dy="20">t</tspan></text>
  <text class="label" x="539" y="512">a<tspan class="sub" dy="20">t+1</tspan></text>
</svg>
